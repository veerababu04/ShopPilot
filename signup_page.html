<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register Here</title>
</head>
<body>
    <table width="100%" bgcolor= #0F172A cellpadding="10" cellspacing="0" border="0" style="font-family: 'Times New Roman', Times, serif;"> 
    <tr align="left">
        <th><img src="./images/logo.png" alt="logo" height="50" width="150px"></th>
        <th><a href="./index.html" style="color: white;">HOME</th>
        <th><a href="./about.html" style="color: white;">ABOUT</th>
        <th><a href="./contact_us.html" style="color: white;">CONTCT US</th>
        <th><a>href=</a></th>
    <table  align="center" border="0" cellpadding="10">
        <tr>
            <td width="40%" align="center" valign="middle">
                <img src="./images/signup.png" alt="Register Now Banner" width="400" height="400">
            </td>

            <td width="60%" align="left" valign="middle">
                <form action="success.html">
                    <fieldset style="width: 500px;">
                        <legend><b>REGISTER HERE</b></legend>
                        
                        <table border="0" width="100%" cellpadding="10">
                            <tr>
                                <td>USERNAME</td>
                                <td><input type="text" size="33" name="username" placeholder="create username" required></td>
                            </tr>
                            <tr>
                                <td>MOBILE NUMBER</td>
                                <td><input type="text" size="33" name="mobile" placeholder="enter mobile number" required></td>
                            </tr>
                            <tr>
                                <td>PASSWORD</td>
                                <td><input type="password" size="33" name="password" placeholder="enter password" required></td>
                            </tr>
                            <tr>
                                <td>CONFIRM PASSWORD</td>
                                <td><input type="password"  size="33" name="confirm_password" placeholder="confirm password" required></td>
                            </tr>
                            <tr>
                                <td></td>
                                <td align="left">
                                    <input type="submit" value="Sign In" style="padding: 5px 15px; background-color: #e0e0e0; border: 1px solid #777; color: blue; text-decoration: underline; cursor: pointer;">
                                </td>
                            </tr>
                            <tr>
                                <td colspan="2" align="left">
                                    <br>
                                    <font size="5"><b>Already have account?</b> <a href="login.html" style="color: purple; text-decoration: underline; font-weight: bold;">Log In</a></font>
                                </td>
                            </tr>
                        </table>
                    </fieldset>
                </form>
            </td>
        </tr>
    </table>

</body>
</html>
